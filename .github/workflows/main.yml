name: Build with Nuitka

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard 
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          # 确保关键库存在
          pip install opencv-python numpy pywin32

      - name: Build with Nuitka
        run: |
          # 核心修正：
          # 1. --assume-yes-for-downloads: 自动允许下载 Dependency Walker，解决 FATAL 报错
          # 2. --standalone: 独立文件夹模式
          # 3. --include-data-dir: 包含模板
          python -m nuitka --standalone `
            --assume-yes-for-downloads `
            --include-data-dir=templates=templates `
            --windows-console-mode=force `
            --output-dir=dist_folder `
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Robot-Tool-Final
          # Nuitka 产出的文件夹路径
          path: dist_folder/main.dist/