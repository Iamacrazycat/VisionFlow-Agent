name: Build and Auto Release

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须取全量记录，否则无法推送标签

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard 
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pip install opencv-python numpy pywin32

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone `
            --assume-yes-for-downloads `
            --include-data-dir=templates=templates `
            --windows-console-mode=force `
            --output-dir=dist_folder `
            main.py

      - name: Generate and Force Push Tag
        run: |
          $date = Get-Date -Format "yyyy.M.d"
          $tag = "v$date"
          "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_NAME=Release $tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 强制更新标签并推送到远程
          git tag -f $tag
          git push origin $tag --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Output
        run: |
          if (Test-Path dist_folder/main.dist/) {
            Compress-Archive -Path dist_folder/main.dist/* -DestinationPath AutoRocoKingdom.zip
          } else {
            Write-Error "Nuitka output directory not found!"
            exit 1
          }

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: AutoRocoKingdom.zip
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}